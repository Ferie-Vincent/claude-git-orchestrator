version: 1
language: en
platform: github
workflow: github-flow
mode: solo  # solo | team — controls enforcement strictness

branches:
  main: main
  prefix:
    feature: feature/
    fix: fix/
    docs: docs/
    chore: chore/
    refactor: refactor/
    test: test/
    perf: perf/
    ci: ci/
    build: build/

commits:
  max_subject_length: 72
  gitmoji: false
  types:
    - feat
    - fix
    - docs
    - style
    - refactor
    - perf
    - test
    - build
    - ci
    - chore
    - revert

merge:
  strategy: squash
  delete_branch_on_merge: true

pull_request:
  template: default
  draft_by_default: false
  require_issue_ref: false

protected_branches:
  - main

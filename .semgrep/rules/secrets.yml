rules:
  - id: generic-api-key
    patterns:
      - pattern-regex: >-
          (?i)(api[_\-]?key|apikey|api[_\-]?token)\s*[:=]\s*['"]?[A-Za-z0-9+/]{20,}['"]?
    message: >
      Potential API key or token hardcoded. Move to environment variable or
      gitignored config file.
    languages: [generic]
    severity: ERROR
    paths:
      exclude:
        - "*.md"
        - "*.example"
        - "*.yml.example"

  - id: private-key-header
    patterns:
      - pattern-regex: "-----BEGIN (RSA |EC |OPENSSH |PGP )?PRIVATE KEY"
    message: Private key material found. Never commit private keys.
    languages: [generic]
    severity: ERROR

  - id: github-token
    patterns:
      - pattern-regex: "gh[pousr]_[A-Za-z0-9]{36,}"
    message: >
      GitHub personal access token detected. Revoke immediately and rotate.
    languages: [generic]
    severity: ERROR
    paths:
      exclude:
        - "*.md"

  - id: aws-access-key
    patterns:
      - pattern-regex: "AKIA[0-9A-Z]{16}"
    message: AWS access key ID detected. Revoke immediately.
    languages: [generic]
    severity: ERROR

  - id: aws-secret-key
    patterns:
      - pattern-regex: >-
          (?i)aws[_\-]?secret[_\-]?access[_\-]?key\s*[:=]\s*['"]?[A-Za-z0-9/+]{40}['"]?
    message: AWS secret access key detected. Revoke immediately.
    languages: [generic]
    severity: ERROR

  - id: generic-password-assignment
    patterns:
      - pattern-regex: >-
          (?i)(password|passwd|pwd)\s*[:=]\s*['"][^'"]{8,}['"]
    message: >
      Hardcoded password detected. Use environment variables or a secrets
      manager instead.
    languages: [generic]
    severity: WARNING
    paths:
      exclude:
        - "*.md"
        - "*.example"
        - "*.yml.example"
        - "docs/"

  - id: slack-webhook
    patterns:
      - pattern-regex: "https://hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+"
    message: Slack webhook URL detected. Rotate this webhook immediately.
    languages: [generic]
    severity: ERROR

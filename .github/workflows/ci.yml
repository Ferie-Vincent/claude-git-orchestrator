name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ── Commit message lint ────────────────────────────────────────────────
  commitlint:
    name: Lint commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
          failOnWarnings: false
          helpURL: https://www.conventionalcommits.org

  # ── Secret detection ───────────────────────────────────────────────────
  gitleaks:
    name: Secret detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── SAST scan ──────────────────────────────────────────────────────────
  semgrep:
    name: SAST scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and shell issues
        run: |
          semgrep scan \
            --config=p/secrets \
            --config=p/bash \
            --error \
            --quiet \
            --exclude='*.md' \
            --exclude='*.html' \
            .
